name: Release
run-name: 'Release and deploy to ${{ inputs.cloudflare_env }} env'

concurrency: release

on:
  workflow_dispatch:
    inputs:
      cloudflare_env:
        description: Branch name for deploy to Cloudflare Pages
        type: choice
        options:
          - stage
          - production
        default: stage
        required: true
      website:
        type: choice
        options:
          - apex
          - docs
        required: true

jobs:
  verify:
    uses: ./.github/workflows/verify.yml

  tag:
    runs-on: ubuntu-latest
    needs: [verify]
    permissions:
      contents: write
    steps:
      - if: github.ref != 'refs/heads/main'
        run: exit 1
      - uses: actions/checkout@v4
      - id: version
        run: |
          VERSION="${{ inputs.website }}.$(git rev-parse --short HEAD).${{ github.run_number }}"
          echo "tag_name=$VERSION" >> "$GITHUB_OUTPUT"
      - name: tag
        env:
          TAG_NAME: ${{ steps.version.outputs.tag_name }}
        run: |
          git config --global user.name "Adam McKee"
          git config --global user.email "adam.be.g84d@gmail.com"
          git tag $TAG_NAME
          git push origin $TAG_NAME
    outputs:
      tag_name: ${{ steps.version.outputs.tag_name }}

  release:
    needs: tag
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.website }}.zip
      - env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.tag.outputs.tag_name }}
        run: |
          gh release create "$TAG_NAME" \
            --prerelease=false \
            --latest=true \
            --notes "[Adam Scott hires OK Computer era Thom Yorke hair stylist](https://www.youtube.com/shorts/svyC91lHAzM)" \
            --repo eighty4/eighty4.tech \
            ${{ inputs.website }}.zip

  deploy:
    needs: [release, tag]
    permissions:
      contents: read
      deployments: write
    uses: ./.github/workflows/deploy.yml
    with:
      cloudflare_env: ${{ inputs.cloudflare_env }}
      release_version: ${{ needs.tag.outputs.tag_name }}
      website: ${{ inputs.website }}
    secrets: inherit
