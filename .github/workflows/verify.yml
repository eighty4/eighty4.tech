name: Verify
run-name: 'Verify ${{ github.sha }} (${{ github.ref_name }})'

on:
  pull_request:
    branches: ['*']
  workflow_call:

jobs:
  verify:
    runs-on: ubuntu-latest
    needs:
      - build-apex
      - build-docs
      - fmtcheck
    steps:
      - run: echo "41°00′19″N 122°59′51″W"

  build-apex:
    uses: ./.github/workflows/build.yml
    with:
      website: apex

  build-docs:
    uses: ./.github/workflows/build.yml
    with:
      website: docs

  fmtcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - uses: pnpm/action-setup@v4
      - run: pnpm i
      - run: pnpm fmtcheck
